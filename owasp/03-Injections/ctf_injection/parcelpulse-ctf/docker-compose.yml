version: "3.9"

services:
    parcelpulse:
        image: node:20
        container_name: parcelpulse-ctf
        working_dir: /app
        volumes:
            - ./app:/app
        command: sh -c "npm install && node server.js"
        ports:
            - "3000:3000"
        environment:
            NODE_ENV: production
        restart: unless-stopped
